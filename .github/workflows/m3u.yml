name: Generate M3U

on:
  schedule:
    - cron: "0 0 * * 1"   # 每周一
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行脚本
        run: python generate_m3u.py

      - name: 提交结果
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add live.m3u
          git commit -m "update m3u" || echo "no change"
          git push
